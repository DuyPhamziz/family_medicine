spring.application.name=family_medicine
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:43200000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}
jwt.clock-skew-ms=${JWT_CLOCK_SKEW_MS:120000}

security.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:true}
security.refresh-cookie.same-site=${REFRESH_COOKIE_SAMESITE:Strict}
security.refresh-cookie.path=${REFRESH_COOKIE_PATH:/api/auth/refresh}
security.refresh-cookie.name=${REFRESH_COOKIE_NAME:refresh_token}

security.rate-limit.login-per-minute=${RATE_LIMIT_LOGIN_PER_MINUTE:5}
security.rate-limit.public-per-minute=${RATE_LIMIT_PUBLIC_PER_MINUTE:60}
security.rate-limit.auth-per-minute=${RATE_LIMIT_AUTH_PER_MINUTE:100}
security.rate-limit.login-lock-minutes=${RATE_LIMIT_LOGIN_LOCK_MINUTES:15}

security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

logging.level.root=WARN
logging.level.com.familymed=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator