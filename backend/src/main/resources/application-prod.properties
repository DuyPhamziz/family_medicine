# Production Configuration
# Override application.properties for production deployment

# Database - use environment variables from hosting platform
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never

# Logging - less verbose in production
logging.level.com.familymed=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Security - enforce secure cookies
security.refresh-cookie.secure=true
security.refresh-cookie.same-site=Strict

# CORS - set to actual production domain
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Actuator - limited exposure
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Disable Swagger in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Performance optimization
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.generate_statistics=false
